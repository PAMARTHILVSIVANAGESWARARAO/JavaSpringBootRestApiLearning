spring.application.name=restlearning

spring.config.import=optional:file:.env[.properties]

server.port=${PORT:1206}


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

# Hibernate Dialect Configuration
# This line tells Hibernate:

# "Generate SQL queries based on MySQL 8 database rules."

# Hibernate supports many databases like MySQL, PostgreSQL, Oracle, SQL Server, etc.
# Each database has slightly different SQL syntax.

# So the dialect acts like a translator between Hibernate and the database.

# Example:

# When you write:

# repository.save(user);

# Hibernate internally creates SQL like:

# insert into users ...

# The dialect helps Hibernate decide:

# which SQL syntax to use
# which data types to use
# how pagination works
# how auto increment works
# which keywords are supported

# For MySQL 8:

# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# means:

# use MySQL 8 optimized SQL generation
# support MySQL 8 features
# generate correct queries for MySQL 8

# Without dialect:

# Hibernate may guess database type
# Sometimes wrong SQL can be generated
# Some features may not work properly

# Simple analogy:

# Java Code → Hibernate → Dialect → MySQL SQL

# Example:

# If using PostgreSQL:

# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# If using Oracle:

# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jpa.show-sql=true

